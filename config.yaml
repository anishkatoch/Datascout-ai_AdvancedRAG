app:
  port: 8001

llm:
  provider: groq                          # groq | openai
  groq_model: llama-3.1-8b-instant       # primary model — fast, 500K tokens/day
  intent_model: llama-3.1-8b-instant     # fast model for YES/NO intent check — keeps latency low
  groq_fallback_models:                  # tried in order when primary is rate-limited
    - llama-3.3-70b-versatile            # 100K tokens/day — high quality
    - llama3-8b-8192                     # 500K tokens/day — fast
    - gemma2-9b-it                       # 500K tokens/day — fast
    - llama3-70b-8192                    # 100K tokens/day — best quality among fallbacks
  openai_model: gpt-4o-mini              # last resort — only used if all Groq models exhausted
  openai_fallback_enabled: true          # true = fall back to OpenAI after all Groq models fail; false = raise error

embeddings:
  provider: bge                          # bge | openai
  bge_model_id: BAAI/bge-large-en-v1.5  # via HuggingFace Inference API (free)
  openai_model: text-embedding-3-small
  dimension: 1024                        # bge=1024  openai=1536 — must match provider

retrieval:
  k: 3              # chunks returned to LLM (more = richer context, slower)
  fetch_k: 10       # candidate pool for MMR (must be >= k)
  lambda_mult: 0.7  # 1.0=pure similarity  0.0=pure diversity  0.7=balanced
  hybrid_top_k: 7   # top-k from BM25 and MMR each before RRF merge
  rerank_top_n: 5   # top-n chunks after reranking sent to LLM
  reranker_model: BAAI/bge-reranker-large  # HuggingFace reranker model

limits:
  max_file_size_mb: 15      # per-file cap
  max_files_per_session: 5  # max files in one chat session
  max_session_size_mb: 50   # total across all files in a session
  dedup_threshold_mb: 2     # files under 2 MB skip TF-IDF similarity check (fast SHA-256 only)
